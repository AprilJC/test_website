<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vercel Deploy Test</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      color: #f5f5f5;
      font-family: system-ui, sans-serif;
      gap: 2rem;
      padding: 2rem;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 4rem);
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .subtitle {
      color: #888;
      font-size: 1.1rem;
    }

    .clock {
      font-size: 1.4rem;
      font-variant-numeric: tabular-nums;
      color: #a3e635;
      letter-spacing: 0.05em;
    }

    .images {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
      max-width: 960px;
    }

    .images img {
      width: 45%;
      min-width: 260px;
      border-radius: 12px;
      border: 1px solid #2a2a2a;
    }
  </style>
</head>
<body>
  <h1>Hello, Vercel! 🚀</h1>
  <p class="subtitle">部署成功 — 静态资源加载测试</p>
  <p class="clock" id="clock"></p>
  <div class="images">
    <img src="images/image1.svg" alt="Image 1" />
    <img src="images/image2.svg" alt="Image 2" />
  </div>

  <script>
    function tick() {
      document.getElementById('clock').textContent = new Date().toLocaleTimeString('zh-CN');
    }
    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
